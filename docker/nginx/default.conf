server {
    listen 80;
    server_name localhost;
    root /var/www/html/web;
    index index.php index.html;

    client_max_body_size 64M;

    # Drupal clean URLs
    location / {
        try_files $uri /index.php?$query_string;
    }

    # Block access to hidden files and directories
    location ~ (^|/)\. {
        return 403;
    }

    # Block access to sensitive files
    location ~* \.(engine|inc|install|make|module|profile|po|sh|.*sql|theme|twig|tpl(\.php)?|xtmpl|yml|yaml)(~|\.sw[op]|\.bak|\.orig|\.save)?$|^(\.(?!well-known).*|Entries.*|Repository|Root|Tag|Template|composer\.(json|lock)|web\.config)$|^#.*#$|\.php(~|\.sw[op]|\.bak|\.orig|\.save)$ {
        deny all;
        return 404;
    }

    # Drupal private files
    location ~ ^/sites/.*/private/ {
        return 403;
    }

    # Block access to scripts in the files directory
    location ~ ^/sites/[^/]+/files/.*\.php$ {
        deny all;
    }

    # PHP handling
    location ~ \.php$|^/update.php {
        fastcgi_split_path_info ^(.+?\.php)(|/.*)$;
        include fastcgi_params;
        fastcgi_param HTTP_PROXY "";
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_intercept_errors on;
        fastcgi_pass drupal:9000;
        fastcgi_read_timeout 300;
    }

    # Serve static files directly
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        try_files $uri @rewrite;
        expires max;
        log_not_found off;
    }

    location @rewrite {
        rewrite ^ /index.php;
    }

    # Drupal image styles
    location ~ ^/sites/.*/files/styles/ {
        try_files $uri @rewrite;
    }
}
