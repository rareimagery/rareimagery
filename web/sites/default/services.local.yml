parameters:
  cors.config:
    enabled: true
    allowedHeaders:
      - Content-Type
      - X-CSRF-Token
      - Authorization
    allowedMethods:
      - GET
      - POST
      - PATCH
      - DELETE
      - OPTIONS
    allowedOrigins:
      - http://localhost:5173
      - http://localhost:5174
    exposedHeaders: false
    maxAge: 3600
    supportsCredentials: true
