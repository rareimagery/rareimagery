langcode: en
status: true
dependencies:
  module:
    - commerce_checkout
    - commerce_stripe
  enforced:
    module:
      - rareimagery_xstore
id: rareimagery
label: 'RareImagery Checkout'
plugin: multistep_default
configuration:
  display_checkout_progress: true
  display_checkout_progress_breadcrumb_links: false
  display_sidebar_checkout_complete: true
  guest_order_assign: true
  guest_new_account: true
  guest_new_account_notify: true
  panes:
    login:
      allow_guest_checkout: true
      allow_registration: true
      step: login
      weight: 0
    contact_information:
      double_entry: false
      step: order_information
      weight: 1
    billing_information:
      step: order_information
      weight: 2
    review:
      step: review
      weight: 3
    payment_information:
      step: review
      weight: 4
    completion_message:
      message:
        value: "Your order number is [commerce_order:order_number]. Thank you for supporting this creator!"
        format: plain_text
      display_pane_summaries: true
      step: complete
      weight: 5
    order_summary:
      view: commerce_checkout_order_summary
      step: _sidebar
      weight: 6
