name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="/opt/rareimagery"

            # Clone if first deploy
            if [ ! -d "$APP_DIR" ]; then
              git clone git@github.com:rareimagery/rareimagery.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            # Build and restart containers
            docker compose build
            docker compose up -d

            # Wait for Drupal container to be ready
            sleep 10

            # Post-deploy: clear cache and run DB updates
            docker compose exec -T drupal vendor/bin/drush cr
            docker compose exec -T drupal vendor/bin/drush updb -y

            # Import any new REST resource configs from config/install
            docker compose exec -T drupal vendor/bin/drush php:eval '
              $dir = DRUPAL_ROOT . "/modules/custom/rareimagery_xstore/config/install/";
              foreach (glob($dir . "rest.resource.*.yml") as $file) {
                $name = basename($file, ".yml");
                if (!\Drupal::configFactory()->get($name)->get("id")) {
                  $data = \Drupal\Component\Serialization\Yaml::decode(file_get_contents($file));
                  \Drupal::configFactory()->getEditable($name)->setData($data)->save();
                  echo "Imported $name\n";
                }
              }
            '

            # Grant API permissions
            docker compose exec -T drupal vendor/bin/drush role:perm:add anonymous 'restful get store_list,restful get store_profile,restful get x_profile_preview'
            docker compose exec -T drupal vendor/bin/drush role:perm:add authenticated 'restful get store_list,restful get store_profile,restful get x_profile_preview,restful post store_create,restful post subscription_checkout,restful post subscription_portal,restful get subscription_status'
            docker compose exec -T drupal vendor/bin/drush cr

            echo "Deploy complete at $(date)"
