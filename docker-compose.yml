services:
  drupal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rareimagery_drupal
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - drupal_files:/var/www/html/web/sites/default/files
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DRUPAL_DB_DRIVER=${DRUPAL_DB_DRIVER:-pgsql}
      - DRUPAL_DB_HOST=${DRUPAL_DB_HOST:-postgres}
      - DRUPAL_DB_PORT=${DRUPAL_DB_PORT:-5432}
      - DRUPAL_DB_NAME=${DRUPAL_DB_NAME:-rareimagery}
      - DRUPAL_DB_USER=${DRUPAL_DB_USER:-rareimagery}
      - DRUPAL_DB_PASSWORD=${DRUPAL_DB_PASSWORD:-rareimagery_secret}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - PRINTFUL_API_KEY=${PRINTFUL_API_KEY:-}
    networks:
      - rareimagery

  nginx:
    image: nginx:1.27-alpine
    container_name: rareimagery_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8088:80"
    volumes:
      - .:/var/www/html
      - drupal_files:/var/www/html/web/sites/default/files
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - drupal
    networks:
      - rareimagery

  node:
    image: node:22-alpine
    container_name: rareimagery_node
    working_dir: /app/frontend
    volumes:
      - .:/app
    command: sleep infinity
    networks:
      - rareimagery

  postgres:
    image: postgres:16-alpine
    container_name: rareimagery_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rareimagery}
      POSTGRES_USER: ${POSTGRES_USER:-rareimagery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rareimagery_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rareimagery}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rareimagery

volumes:
  postgres_data:
  drupal_files:

networks:
  rareimagery:
    driver: bridge
